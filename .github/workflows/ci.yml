name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Tests Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip, pdo_sqlite, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_HOST=db|# DB_HOST=db|' .env
          touch database/database.sqlite

      - name: Run migrations & seed
        run: php artisan migrate --force --seed
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  docker-build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: formation-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sanity check image
        run: |
          docker run --rm --entrypoint php formation-app:${{ github.sha }} --version
          docker run --rm --entrypoint php formation-app:${{ github.sha }} artisan --version

  deploy-stack:
    name: Integration test (docker-compose)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare .env
        run: |
          cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "App did not start in time"
          docker compose logs
          exit 1

      - name: Smoke test endpoints
        run: |
          curl -sf http://localhost:8000/ | grep -q "FormaPro"
          curl -sf http://localhost:8000/formations | grep -q "Docker"

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
