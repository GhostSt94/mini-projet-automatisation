name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Tests Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip, pdo_sqlite, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_HOST=db|# DB_HOST=db|' .env
          touch database/database.sqlite

      - name: Run migrations & seed
        run: php artisan migrate --force --seed
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  build-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/formation-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sanity check pushed image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/formation-app:latest
          docker run --rm --entrypoint php \
            ${{ secrets.DOCKERHUB_USERNAME }}/formation-app:latest --version
          docker run --rm --entrypoint php \
            ${{ secrets.DOCKERHUB_USERNAME }}/formation-app:latest artisan --version

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Render docker-compose.prod.yml with username
        run: |
          sed -i "s|__DOCKERHUB_USERNAME__|${{ secrets.DOCKERHUB_USERNAME }}|g" \
            docker-compose.prod.yml

      - name: Encode compose file (single-step transfer)
        id: encode
        run: |
          COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)
          echo "compose_b64=$COMPOSE_B64" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS (single SSH session)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            mkdir -p ~/formapro
            cd ~/formapro
            echo "${{ steps.encode.outputs.compose_b64 }}" | base64 -d > docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Smoke test deployed app
        run: |
          for i in {1..20}; do
            if curl -sf http://${{ secrets.VPS_HOST }}:8000/ | grep -q "FormaPro"; then
              echo "✅ Deployed app responds with FormaPro content"
              exit 0
            fi
            echo "Waiting for app... ($i/20)"
            sleep 5
          done
          echo "❌ Deployed app did not respond in time"
          exit 1
